name: Build Pull Request

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel / x86_64 – native build on the last Intel GitHub runner image
          - arch: x86_64
            runner: macos-13
          # Apple Silicon / arm64 – native build on the arm64 runner image
          - arch: arm64
            runner: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
          brew install cmake ninja openssl zlib

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DPUREDARWIN_TARGET_ARCH=${{ matrix.arch }} \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl)" \
            -DZLIB_ROOT="$(brew --prefix zlib)"

      - name: Build
        run: cmake --build build
