# QEMU readconfig for PureDarwin 17.4 Beta.
# Image path is substituted by run.sh (@PD_DISK_IMAGE@).
[machine]
  type = "pc-i440fx-2.12"
  accel = "@PD_ACCEL@"
  graphics = "off"

[memory]
  size = "@PD_MEMORY_MB@M"

[smp-opts]
  cpus = "@PD_SMP@"

[chardev "serial0"]
  backend = "@PD_SERIAL_BACKEND@"
@PD_SERIAL_PATH_LINE@

[device "serial"]
  driver = "isa-serial"
  chardev = "serial0"

[netdev "net0"]
  type = "user"
  id = "net0"

[device "net0"]
  driver = "rtl8139"
  netdev = "net0"

[drive "disk0"]
  file = "@PD_DISK_IMAGE@"
  format = "@PD_DISK_FORMAT@"
  if = "ide"
